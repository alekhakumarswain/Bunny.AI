
<html>
<head>
    <title>Clickjacking Test</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; }
        .victim {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            border: none;
            opacity: 0.5; /* Make it semi-transparent for demonstration */
            z-index: 1;
        }
        .overlay {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            font-size: 2em;
            color: #fff;
            background-color: rgba(0, 0, 0, 0.7); /* Dark overlay */
            cursor: pointer;
        }
        .message {
            background-color: rgba(255, 0, 0, 0.8);
            padding: 20px 40px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>
    <iframe class="victim" src="https://alekhakumarswain.web.app/"></iframe>
    <div class="overlay">
        <div class="message">
            Click this button! (This is a Clickjacking example)
        </div>
    </div>
</body>
</html>
