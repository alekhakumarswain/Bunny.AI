
<!DOCTYPE html>
<html>
<head>
<title>Clickjacking Test</title>
<style>
  body { margin: 0; padding: 0; overflow: hidden; }
  .overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 10;
    background: rgba(255, 0, 0, 0.1); /* Semi-transparent overlay */
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 3em;
    color: red;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
  }
  iframe {
    width: 100vw;
    height: 100vh;
    border: none;
    opacity: 0.5; /* Make the iframe semi-transparent to see the overlay effect */
  }
</style>
</head>
<body>
  <div class="overlay">CLICK ME</div>
  <iframe src="https://alekhakumarswain.web.app" scrolling="no"></iframe>
  <p style="position: absolute; top: 10px; left: 10px; z-index: 20; color: white; background: black; padding: 5px;">
    This page demonstrates potential clickjacking vulnerability. The "CLICK ME" text is an overlay.
    If you click, you might be interacting with the hidden content of the iframe.
  </p>
</body>
</html>
